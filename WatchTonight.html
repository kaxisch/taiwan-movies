  body { background-color: var(--bg-deep); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
  .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>

<script>
const TMDB_KEY = "2ff61a89bf2684be8b207853cd89db24";
const OMDB_KEY = "d2e6c0dc";
const TMDB = "https://api.themoviedb.org/3";
const IMG_W = "https://image.tmdb.org/t/p/w500";
const IMG_BG = "https://image.tmdb.org/t/p/w1280";
const CACHE_KEY = "watchtonight_v2";
const CACHE_TTL = 24 * 60 * 60 * 1000;

let allMovies = { now: [], soon: [], stream: [] };
let filtered = { now: [], soon: [], stream: [] };
let currentTab = "now";
let heroMovieId = null;
let heroTrailerKey = null;
let activeGenres = new Set();
let activePlatforms = new Set();

function today() { return new Date().toISOString().split("T")[0]; }
function daysAgo(n) { return new Date(Date.now() - n*86400000).toISOString().split("T")[0]; }
function daysLater(n) { return new Date(Date.now() + n*86400000).toISOString().split("T")[0]; }

async function tmdbFetch(path, params={}) {
  const url = new URL(TMDB + path);
  url.searchParams.set("api_key", TMDB_KEY);
  url.searchParams.set("language", "zh-TW");
  url.searchParams.set("region", "TW");
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url.toString());
  if (!r.ok) throw new Error("TMDB " + r.status);
  return r.json();
}

async function fetchPages(path, params, maxPages=3) {
  const first = await tmdbFetch(path, {...params, page:1});
  const total = Math.min(first.total_pages, maxPages);
  const rest = await Promise.all(
    Array.from({length: total-1}, (_,i) => tmdbFetch(path, {...params, page:i+2}))
  );
  return [first,...rest].flatMap(r=>r.results);
}

async function getDetail(id) {
  try {
    const d = await tmdbFetch(`/movie/${id}`, {append_to_response:"videos,credits,watch/providers"});
    const trailer = (d.videos?.results||[]).find(v=>v.type==="Trailer"&&v.site==="YouTube") ||
                    (d.videos?.results||[])[0];
    const providers = d["watch/providers"]?.results?.TW;
    const platforms = [...new Set([
      ...(providers?.flatrate||[]),
      ...(providers?.rent||[]),
      ...(providers?.buy||[])
    ])].map(p=>({name:p.provider_name, logo:p.logo_path}));
    return {
      duration: d.runtime||"",
      genres: (d.genres||[]).map(g=>g.name),
      synopsis: d.overview||"",
      poster: d.poster_path ? IMG_W+d.poster_path : null,
      backdrop: d.backdrop_path ? IMG_BG+d.backdrop_path : null,
      voteAverage: d.vote_average ? d.vote_average.toFixed(1) : "",
      voteCount: d.vote_count||0,
      trailerKey: trailer?.key||null,
      cast: (d.credits?.cast||[]).slice(0,8).map(c=>({name:c.name,char:c.character,photo:c.profile_path?IMG_W+c.profile_path:null})),
      crew: (d.credits?.crew||[]).filter(c=>["Director","Screenplay","Writer"].includes(c.job)).slice(0,3),
      budget: d.budget||0,
      revenue: d.revenue||0,
      status: d.status||"",
      origLang: d.original_language||"",
      origTitle: d.original_title||"",
      keywords: [],
      platforms
    };
  } catch(e) { return {}; }
}

async function getImdb(imdbId) {
  if (!imdbId) return "";
  try {
    const r = await fetch(`https://www.omdbapi.com/?i=${imdbId}&apikey=${OMDB_KEY}`);
    const d = await r.json();
    return d.imdbRating && d.imdbRating !== "N/A" ? d.imdbRating : "";
  } catch(e) { return ""; }
}

async function fetchAll() {
  const [nowRaw, soonRaw, streamRaw] = await Promise.all([
    fetchPages("/discover/movie", {
      "release_date.gte": daysAgo(30),
      "release_date.lte": today(),
      sort_by: "popularity.desc",
      with_release_type: "3|2"
    }),
    fetchPages("/discover/movie", {
      "release_date.gte": daysLater(1),
      "release_date.lte": daysLater(180),
      sort_by: "release_date.asc",
      with_release_type: "3|2"
    }),
    fetchPages("/discover/movie", {
      "release_date.gte": daysAgo(30),
      "release_date.lte": today(),
      sort_by: "popularity.desc",
      watch_region: "TW",
      with_watch_monetization_types: "flatrate",
      "vote_count.gte": 50
    }, 2)
  ]);

  const dedup = arr => [...new Map(arr.map(m=>[m.id,m])).values()];
  const np = dedup(nowRaw).slice(0,30);
  const cs = dedup(soonRaw).slice(0,40);
  const st = dedup(streamRaw).filter(m=>!np.find(n=>n.id===m.id)).slice(0,30);

  async function enrich(list, needImdb=true) {
    const details = await Promise.all(list.map(m=>getDetail(m.id)));
    const imdbIds = details.map(d=>d.imdbId||null);
    let imdbRatings = [];
    if (needImdb) {
      // batch omdb — only for now/stream (has ratings)
      imdbRatings = await Promise.all(details.map(async (d,i) => {
        // get imdb_id from basic tmdb data
        try {
          const ext = await tmdbFetch(`/movie/${list[i].id}/external_ids`);
          return await getImdb(ext.imdb_id);
        } catch(e) { return ""; }
      }));
    }
    return list.map((m,i)=>({
      id: m.id,
      titleZh: m.title||"",
      titleEn: m.original_title||"",
      releaseDate: m.release_date||"",
      poster: details[i].poster||null,
      backdrop: details[i].backdrop||null,
      genre: details[i].genres||[],
      duration: details[i].duration||"",
      synopsis: details[i].synopsis||"",
      voteAverage: details[i].voteAverage||"",
      voteCount: details[i].voteCount||0,
      imdb: needImdb ? (imdbRatings[i]||"") : "",
      trailerKey: details[i].trailerKey||null,
      cast: details[i].cast||[],
      crew: details[i].crew||[],
      budget: details[i].budget||0,
      revenue: details[i].revenue||0,
      status: details[i].status||"",
      origLang: details[i].origLang||"",
      origTitle: details[i].origTitle||"",
      platforms: details[i].platforms||[],
      popularity: m.popularity||0
    }));
  }

  const [nowEnriched, soonEnriched, streamEnriched] = await Promise.all([
    enrich(np, true),
    enrich(cs, false),
    enrich(st, true)
  ]);

  return { now: nowEnriched, soon: soonEnriched, stream: streamEnriched };
}

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch(e) {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null;
    return data;
  } catch(e) { return null; }
}

function formatDate(d) {
  if (!d) return "";
  const [y,m,day] = d.split("-");
  return `${y}/${m}/${day}`;
}

function cardHTML(m, showRatings) {
  const poster = m.poster
    ? `<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="${m.poster}" alt="" loading="lazy"/>`
    : `<div class="w-full h-full flex items-center justify-center text-white/10"><span class="material-symbols-outlined text-5xl">movie</span></div>`;
  const ratings = showRatings
    ? `<p class="text-white/50 text-[11px]">${m.voteAverage ? 'TMDB '+m.voteAverage : '—'}${m.imdb ? ' · IMDb '+m.imdb : ''}</p>`
    : '';
  return `
    <div class="group cursor-pointer fade-in" onclick="openModal(${m.id})">
      <div class="relative aspect-[2/3] rounded-2xl overflow-hidden mb-3 glass glass-hover transition-all duration-500">
        ${poster}
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
          <span class="text-[11px] font-light text-white/80">${m.genre.slice(0,2).join(' / ')}</span>
        </div>
      </div>
      <h3 class="text-white font-light text-sm truncate mb-0.5">${m.titleZh}</h3>
      ${m.titleEn && m.titleEn !== m.titleZh ? `<p class="text-white/30 text-[10px] uppercase tracking-wide truncate mb-1">${m.titleEn}</p>` : '<div class="mb-1"></div>'}
      <p class="text-white/40 text-[11px] mb-0.5">${formatDate(m.releaseDate)}</p>
      ${ratings}
    </div>`;
}

function skeletonHTML() {
  return Array.from({length:5}).map(()=>`
    <div>
      <div class="aspect-[2/3] rounded-2xl skeleton mb-3"></div>
      <div class="h-3 skeleton rounded mb-1.5 w-3/4"></div>
      <div class="h-2.5 skeleton rounded mb-1.5 w-1/2"></div>
      <div class="h-2.5 skeleton rounded w-2/3"></div>
    </div>`).join('');
}

function showSkeletons() {
  ["now","soon","stream"].forEach(t => {
    document.getElementById("grid-"+t).innerHTML = skeletonHTML();
  });
}

function renderGrids() {
  ["now","soon","stream"].forEach(t => {
    const showR = t !== "soon";
    const html = filtered[t].map(m=>cardHTML(m,showR)).join('');
    document.getElementById("grid-"+t).innerHTML = html || '';
    document.getElementById("empty-"+t).classList.toggle("hidden", filtered[t].length > 0);
  });
}

function renderHero(movies) {
  if (!movies || !movies.length) return;
  const m = movies.reduce((a,b)=>b.popularity>a.popularity?b:a, movies[0]);
  heroMovieId = m.id;
  heroTrailerKey = m.trailerKey;
  document.getElementById("hero-title").textContent = m.titleZh||"—";
  document.getElementById("hero-synopsis").textContent = m.synopsis||"—";
  document.getElementById("hero-tmdb").textContent = "TMDB " + (m.voteAverage||"—");
  document.getElementById("hero-imdb").textContent = "IMDb " + (m.imdb||"—");
  if (m.backdrop) {
    const img = document.getElementById("hero-img");
    img.style.opacity = "0";
    img.src = m.backdrop;
    img.onload = () => { img.style.opacity = "0.6"; };
  }
  document.getElementById("hero-trailer-btn").style.display = m.trailerKey ? "" : "none";
}

function applyFilters() {
  const minRating = parseFloat(document.getElementById("min-rating-select").value)||0;
  const searchVal = document.getElementById("tab-search").value.toLowerCase();
  ["now","soon","stream"].forEach(t=>{
    filtered[t] = allMovies[t].filter(m=>{
      const matchSearch = !searchVal ||
        m.titleZh.toLowerCase().includes(searchVal) ||
        m.titleEn.toLowerCase().includes(searchVal);
      const tmdbScore = parseFloat(m.voteAverage)||0;
      const imdbScore = parseFloat(m.imdb)||0;
      const matchRating = minRating === 0 || tmdbScore >= minRating || imdbScore >= minRating;
      const matchGenre = activeGenres.size === 0 || m.genre.some(g=>activeGenres.has(g));
      const matchPlatform = t !== "stream" || activePlatforms.size === 0 ||
        m.platforms.some(p=>activePlatforms.has(p.name));
      return matchSearch && matchRating && matchGenre && matchPlatform;
    });
  });
  sortMovies();
}

function sortMovies() {
  const val = document.getElementById("sort-select").value;
  const sorters = {
    date_desc: (a,b)=>b.releaseDate.localeCompare(a.releaseDate),
    date_asc:  (a,b)=>a.releaseDate.localeCompare(b.releaseDate),
    tmdb_desc: (a,b)=>(parseFloat(b.voteAverage)||0)-(parseFloat(a.voteAverage)||0),
    tmdb_asc:  (a,b)=>(parseFloat(a.voteAverage)||0)-(parseFloat(b.voteAverage)||0),
    imdb_desc: (a,b)=>(parseFloat(b.imdb)||0)-(parseFloat(a.imdb)||0),
    imdb_asc:  (a,b)=>(parseFloat(a.imdb)||0)-(parseFloat(b.imdb)||0),
  };
  ["now","soon","stream"].forEach(t=>{
    filtered[t] = [...filtered[t]].sort(sorters[val]||sorters.date_desc);
  });
  renderGrids();
}

function tabSearch(val) { applyFilters(); }
function globalSearch(val) {
  document.getElementById("tab-search").value = val;
  applyFilters();
}

function buildGenreFilters() {
  const genres = new Set(Object.values(allMovies).flat().flatMap(m=>m.genre));
  const container = document.getElementById("genre-filters");
  container.innerHTML = [...genres].sort().map(g=>`
    <button onclick="toggleGenre('${g}',this)" class="px-3 py-1 rounded-full text-xs border border-white/10 text-white/50 hover:text-white transition-all">${g}</button>
  `).join('');
}

function buildPlatformFilters() {
  const platforms = new Set(allMovies.stream.flatMap(m=>m.platforms.map(p=>p.name)));
  const container = document.getElementById("platform-filters");
  container.innerHTML = [...platforms].sort().map(p=>`
    <button onclick="togglePlatform('${p}',this)" class="px-3 py-1 rounded-full text-xs border border-white/10 text-white/50 hover:text-white transition-all">${p}</button>
  `).join('');
}

function toggleGenre(g, btn) {
  if (activeGenres.has(g)) { activeGenres.delete(g); btn.classList.remove("bg-white/20","text-white"); btn.classList.add("text-white/50"); }
  else { activeGenres.add(g); btn.classList.add("bg-white/20","text-white"); btn.classList.remove("text-white/50"); }
  applyFilters();
}

function togglePlatform(p, btn) {
  if (activePlatforms.has(p)) { activePlatforms.delete(p); btn.classList.remove("bg-white/20","text-white"); btn.classList.add("text-white/50"); }
  else { activePlatforms.add(p); btn.classList.add("bg-white/20","text-white"); btn.classList.remove("text-white/50"); }
  applyFilters();
}

function toggleFilter() {
  const panel = document.getElementById("filter-panel");
  const streamFilter = document.getElementById("stream-platform-filter");
  panel.classList.toggle("hidden");
  streamFilter.classList.toggle("hidden", currentTab !== "stream");
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("tab-active"));
  document.getElementById("content-"+t).classList.add("active");
  document.getElementById("tab-"+t).classList.add("tab-active");
  const streamFilter = document.getElementById("stream-platform-filter");
  if (!document.getElementById("filter-panel").classList.contains("hidden")) {
    streamFilter.classList.toggle("hidden", t !== "stream");
  }
}

async function openModal(id) {
  const modal = document.getElementById("detail-modal");
  const content = document.getElementById("modal-content");
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
  content.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="skeleton w-16 h-16 rounded-full"></div></div>`;

  const movie = Object.values(allMovies).flat().find(m=>m.id===id) || {};
  const detail = await getDetail(id);

  let imdbRating = movie.imdb || "";
  if (!imdbRating) {
    try {
      const ext = await tmdbFetch(`/movie/${id}/external_ids`);
      imdbRating = await getImdb(ext.imdb_id);
    } catch(e) {}
  }

  const castHTML = (detail.cast||[]).map(c=>`
    <div class="flex-shrink-0 w-20 text-center">
      ${c.photo ? `<img src="${c.photo}" class="w-16 h-16 rounded-full object-cover mx-auto mb-1" loading="lazy"/>` : `<div class="w-16 h-16 rounded-full glass mx-auto mb-1 flex items-center justify-center"><span class="material-symbols-outlined text-white/20">person</span></div>`}
      <p class="text-white text-[11px] font-light leading-tight">${c.name}</p>
      <p class="text-white/40 text-[10px] leading-tight truncate">${c.char}</p>
    </div>`).join('');

  const crewHTML = (detail.crew||[]).map(c=>`
    <div>
      <p class="text-white text-sm font-light">${c.name}</p>
      <p class="text-white/40 text-xs">${c.job}</p>
    </div>`).join('');

  const platformHTML = (detail.platforms||[]).length ? `
    <div class="mb-6">
      <p class="text-white/40 text-xs uppercase tracking-wider mb-3">收看平台</p>
      <div class="flex flex-wrap gap-2">
        ${(detail.platforms||[]).map(p=>`
          <div class="flex items-center gap-1.5 glass px-3 py-1.5 rounded-lg">
            ${p.logo ? `<img src="https://image.tmdb.org/t/p/w92${p.logo}" class="w-5 h-5 rounded object-cover"/>` : ''}
            <span class="text-xs text-white/70">${p.name}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  const metaRows = [
    ["原始標題", detail.origTitle||movie.titleEn||"—"],
    ["狀態", detail.status||"—"],
    ["原始語言", detail.origLang||"—"],
    ["電影成本", detail.budget ? "$"+detail.budget.toLocaleString() : "—"],
    ["票房收入", detail.revenue ? "$"+detail.revenue.toLocaleString() : "—"],
    ["上映日期", formatDate(movie.releaseDate)||"—"],
  ].map(([k,v])=>`
    <div class="flex gap-4">
      <span class="text-white/40 text-xs w-20 flex-shrink-0 pt-0.5">${k}</span>
      <span class="text-white text-xs">${v}</span>
    </div>`).join('');

  const trailerKey = detail.trailerKey || movie.trailerKey;

  content.innerHTML = `
    <div class="fade-in">
      <!-- Modal Hero -->
      <div class="relative h-[45vh] min-h-[300px] overflow-hidden">
        ${detail.backdrop ? `<img src="${detail.backdrop}" class="w-full h-full object-cover opacity-70"/>` : '<div class="w-full h-full bg-white/5"></div>'}
        <div class="absolute inset-0" style="background:linear-gradient(0deg,#0a0a0f 0%,rgba(10,10,15,0.3) 60%,transparent 100%)"></div>
        <div class="absolute inset-0" style="background:linear-gradient(90deg,rgba(10,10,15,0.7) 0%,transparent 60%)"></div>
        <div class="absolute bottom-0 left-0 p-6 md:p-8">
          <div class="flex items-center gap-3 mb-2">
            ${detail.genres ? detail.genres.slice(0,3).map(g=>`<span class="glass px-2.5 py-0.5 rounded text-[10px] tracking-wide">${g}</span>`).join('') : ''}
          </div>
          <h2 class="text-white font-thin text-3xl md:text-4xl mb-1">${movie.titleZh||detail.origTitle||"—"}</h2>
          <p class="text-white/40 text-sm mb-3">${detail.origTitle||""} ${movie.releaseDate ? '· '+movie.releaseDate.split('-')[0] : ''} ${detail.duration ? '· '+detail.duration+'分鐘' : ''}</p>
          <div class="flex items-center gap-4 mb-4">
            <div class="flex items-center gap-1 text-white/80">
              <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">star</span>
              <span class="text-sm">TMDB ${detail.voteAverage||"—"}</span>
            </div>
            ${imdbRating ? `<div class="w-[1px] h-3 bg-white/20"></div><div class="flex items-center gap-1 text-white/80"><span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">star</span><span class="text-sm">IMDb ${imdbRating}</span></div>` : ''}
          </div>
          <div class="flex gap-3">
            ${trailerKey ? `<button onclick="playTrailer('${trailerKey}')" class="px-5 py-2 text-sm rounded-full flex items-center gap-1.5 transition-all" style="background:rgba(255,255,255,0.18);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.25)"><span class="material-symbols-outlined text-[16px]">play_arrow</span>播放預告</button>` : ''}
          </div>
        </div>
      </div>
      <!-- Modal Body -->
      <div class="px-6 md:px-8 py-6 space-y-8">
        ${detail.synopsis ? `<div><p class="text-white/60 text-sm leading-relaxed">${detail.synopsis}</p></div>` : ''}
        ${crewHTML ? `<div class="grid grid-cols-2 md:grid-cols-3 gap-4 glass rounded-2xl p-4">${crewHTML}</div>` : ''}
        ${castHTML ? `<div><p class="text-white/40 text-xs uppercase tracking-wider mb-3">主要演員</p><div class="flex gap-4 overflow-x-auto pb-2">${castHTML}</div></div>` : ''}
        ${platformHTML}
        <div>
          <p class="text-white/40 text-xs uppercase tracking-wider mb-3">其他資訊</p>
          <div class="glass rounded-2xl p-4 space-y-3">${metaRows}</div>
        </div>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById("detail-modal").classList.add("hidden");
  document.body.style.overflow = "";
}

function openTrailer() { if (heroTrailerKey) playTrailer(heroTrailerKey); }

function playTrailer(key) {
  document.getElementById("trailer-iframe").src = `https://www.youtube.com/embed/${key}?autoplay=1`;
  document.getElementById("trailer-modal").classList.remove("hidden");
  document.getElementById("trailer-modal").classList.add("flex");
}

function closeTrailer() {
  document.getElementById("trailer-iframe").src = "";
  document.getElementById("trailer-modal").classList.add("hidden");
  document.getElementById("trailer-modal").classList.remove("flex");
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeModal(); closeTrailer(); }
});

async function loadData(forceRefresh=false) {
  const btn = document.getElementById("refresh-btn");
  const icon = document.getElementById("refresh-icon");
  const errBanner = document.getElementById("error-banner");
  errBanner.classList.add("hidden");

  if (!forceRefresh) {
    const cached = loadCache();
    if (cached) {
      allMovies = cached;
      filtered = { now:[...cached.now], soon:[...cached.soon], stream:[...cached.stream] };
      renderHero(allMovies.now);
      renderGrids();
      buildGenreFilters();
      buildPlatformFilters();
      return;
    }
  }

  icon.classList.add("spinning");
  btn.disabled = true;
  showSkeletons();

  try {
    const data = await fetchAll();
    allMovies = data;
    filtered = { now:[...data.now], soon:[...data.soon], stream:[...data.stream] };
    saveCache(data);
    renderHero(allMovies.now);
    renderGrids();
    buildGenreFilters();
    buildPlatformFilters();
  } catch(e) {
    errBanner.textContent = "⚠️ 資料載入失敗：" + e.message + "。顯示上次快取資料。";
    errBanner.classList.remove("hidden");
    const cached = loadCache();
    if (cached) {
      allMovies = cached;
      filtered = { now:[...cached.now], soon:[...cached.soon], stream:[...cached.stream] };
      renderHero(allMovies.now);
      renderGrids();
    }
  } finally {
    icon.classList.remove("spinning");
    btn.disabled = false;
  }
}

function refreshData() { loadData(true); }

loadData();
</script>
