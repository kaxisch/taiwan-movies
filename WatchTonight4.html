<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WatchTonight｜今晚看什麼</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..400,0..1&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Manrope', sans-serif; }
:root { --bg: #0a0a0f; --glass-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08); }
body { background: var(--bg); color: #fff; min-height: 100vh; font-weight: 300; }
.material-symbols-outlined { font-family: 'Material Symbols Outlined' !important; font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; font-weight: normal; font-style: normal; display: inline-block; line-height: 1; text-transform: none; letter-spacing: normal; }
.glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }

/* NAVBAR */
#navbar { position: fixed; top: 0; width: 100%; z-index: 50; background: rgba(10,10,15,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.3s; }
#navbar.scrolled { background: rgba(10,10,15,0.92); }
.nav-inner { display: flex; justify-content: space-between; align-items: center; padding: 16px 64px; max-width: 1440px; margin: 0 auto; }
.nav-logo { font-size: 20px; font-weight: 200; letter-spacing: -0.5px; color: #fff; }
.nav-logo span { color: rgba(255,255,255,0.5); font-size: 14px; margin-left: 6px; }
.nav-right { display: flex; align-items: center; gap: 8px; }
.search-wrap { position: relative; display: none; }
@media(min-width:1024px){ .search-wrap { display: block; } .nav-icon-btn.mobile-only { display: none; } }
.search-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 6px 16px 6px 36px; font-size: 14px; font-weight: 300; color: #fff; width: 256px; outline: none; transition: border-color 0.2s; }
.search-input::placeholder { color: rgba(255,255,255,0.4); }
.search-input:focus { border-color: rgba(255,255,255,0.4); }
.search-icon-abs { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 18px; pointer-events: none; }
.nav-icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; border-radius: 999px; transition: background 0.2s, color 0.2s; }
.nav-icon-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
.nav-refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border: none; background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; border-radius: 999px; transition: background 0.2s, color 0.2s; font-size: 14px; font-weight: 300; font-family: 'Manrope', sans-serif; }
.nav-refresh-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
.nav-refresh-btn .refresh-label { display: none; }
@media(min-width:1024px){ .nav-refresh-btn .refresh-label { display: inline; } .nav-refresh-btn { width: auto; height: auto; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.spinning { animation: spin 1s linear infinite; display: inline-block; }

/* HERO */
#hero { position: relative; height: 55vh; min-height: 420px; overflow: hidden; display: flex; align-items: flex-end; padding-bottom: 48px; }
#hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: opacity 0.7s; }
.hero-gradient { position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg) 0%, rgba(10,10,15,0.3) 50%, rgba(10,10,15,0) 100%); }
.hero-gradient-side { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(10,10,15,0.5) 0%, rgba(10,10,15,0) 60%); }
.hero-content { position: relative; z-index: 2; padding: 0 64px; width: 100%; max-width: 1440px; margin: 0 auto; }
.hero-inner { max-width: 640px; }
.hero-ratings { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.hero-rating-item { display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.8); font-size: 12px; }
.hero-divider { width: 1px; height: 12px; background: rgba(255,255,255,0.2); }
.hero-title { font-size: clamp(36px, 5vw, 56px); font-weight: 200; letter-spacing: -1px; color: #fff; margin-bottom: 12px; line-height: 1.1; }
.hero-synopsis { color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 300; margin-bottom: 24px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 480px; }
.hero-btns { display: flex; gap: 12px; }
.btn-trailer { padding: 10px 24px 10px 16px; background: rgba(255,255,255,0.18); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 400; display: flex; align-items: center; gap: 6px; transition: background 0.2s; font-family: 'Manrope', sans-serif; }
.btn-trailer:hover { background: rgba(255,255,255,0.26); }
.btn-detail { padding: 10px 24px; background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); color: #fff; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 300; transition: background 0.2s; font-family: 'Manrope', sans-serif; }
.btn-detail:hover { background: rgba(255,255,255,0.12); }

/* TAB BAR */
#tab-bar { position: sticky; top: 64px; z-index: 40; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
.tab-bar-inner { max-width: 1440px; margin: 0 auto; padding: 0 64px; }
.tabs { display: flex; gap: 32px; }
.tab-btn { padding: 16px 0; font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.4); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.2s; font-family: 'Manrope', sans-serif; white-space: nowrap; }
.tab-btn:hover { color: #fff; }
.tab-btn.active { color: #fff; border-bottom-color: #fff; }
.filter-row { display: flex; flex-direction: column; gap: 12px; padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.05); }
@media(min-width:768px){ .filter-row { flex-direction: row; align-items: center; justify-content: space-between; } }
.tab-search-wrap { position: relative; }
.tab-search { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 10px 16px 10px 36px; font-size: 14px; font-weight: 300; color: #fff; width: 288px; outline: none; transition: border-color 0.2s; font-family: 'Manrope', sans-serif; }
.tab-search::placeholder { color: rgba(255,255,255,0.4); }
.tab-search:focus { border-color: rgba(255,255,255,0.4); }
.filter-right { display: flex; align-items: center; gap: 12px; }
.sort-label { font-size: 14px; color: rgba(255,255,255,0.5); }
.sort-select { background: transparent; border: none; font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.8); cursor: pointer; outline: none; font-family: 'Manrope', sans-serif; }
.sort-select option { background: #1a1a2e; }
.divider-v { width: 1px; height: 16px; background: rgba(255,255,255,0.1); }
.filter-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: transparent; border: none; font-size: 14px; color: rgba(255,255,255,0.6); cursor: pointer; border-radius: 8px; transition: background 0.2s, color 0.2s; font-family: 'Manrope', sans-serif; }
.filter-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
#filter-panel { display: none; padding-bottom: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 16px; }
.filter-groups { display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 16px; }
.filter-group-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.filter-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.filter-tag { padding: 4px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.5); background: none; cursor: pointer; transition: all 0.2s; font-family: 'Manrope', sans-serif; }
.filter-tag:hover { color: #fff; }
.filter-tag.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.3); }
.rating-select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px; font-size: 14px; color: rgba(255,255,255,0.8); outline: none; min-width: 120px; font-family: 'Manrope', sans-serif; }
.rating-select option { background: #1a1a2e; }
.clear-btn { display: flex; align-items: center; gap: 6px; padding: 6px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff; border-radius: 999px; cursor: pointer; font-size: 14px; transition: background 0.2s; font-family: 'Manrope', sans-serif; }
.clear-btn:hover { background: rgba(255,255,255,0.12); }

/* CONTENT */
.content-area { padding: 40px 64px; max-width: 1440px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
@media(min-width:768px){ .movie-grid { grid-template-columns: repeat(3, 1fr); } }
@media(min-width:1024px){ .movie-grid { grid-template-columns: repeat(5, 1fr); } }
.empty-msg { display: none; text-align: center; color: rgba(255,255,255,0.3); font-size: 14px; padding: 80px 0; }
.empty-msg.show { display: block; }

/* CARD */
.movie-card { cursor: pointer; }
.card-img-wrap { position: relative; aspect-ratio: 2/3; border-radius: 16px; overflow: hidden; margin-bottom: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); transition: border-color 0.3s; }
.card-img-wrap:hover { border-color: rgba(255,255,255,0.15); box-shadow: 0 0 20px rgba(255,255,255,0.05); }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s; }
.card-img-wrap:hover img { transform: scale(1.08); }
.card-hover-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); opacity: 0; transition: opacity 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
.card-img-wrap:hover .card-hover-overlay { opacity: 1; }
.card-hover-genre { font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 300; }
.card-no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.1); }
.card-title { font-size: 14px; font-weight: 300; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.card-title-en { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-date { font-size: 11px; color: rgba(255,255,255,0.4); }
.badge-imdb { background: rgba(245,210,80,0.25); border: 1px solid rgba(245,210,80,0.8); color: rgba(255,255,255,0.75); border-radius: 4px; padding: 1px 5px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.badge-tmdb { background: rgba(90,200,250,0.25); border: 1px solid rgba(90,200,250,0.8); color: rgba(255,255,255,0.75); border-radius: 4px; padding: 1px 5px; font-size: 10px; font-weight: 600; white-space: nowrap; }

/* SKELETON */
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }

/* MODAL */
#detail-modal { position: fixed; inset: 0; z-index: 60; display: none; }
#detail-modal.open { display: block; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
.modal-scroll { position: relative; width: 100%; height: 100%; overflow-y: auto; }
.modal-inner { position: relative; max-width: 896px; margin: 0 auto; min-height: 100vh; }
.modal-close { position: fixed; top: 16px; right: 16px; z-index: 70; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 999px; color: rgba(255,255,255,0.6); cursor: pointer; transition: color 0.2s; }
.modal-close:hover { color: #fff; }
.modal-hero { position: relative; height: 45vh; min-height: 300px; overflow: hidden; }
.modal-hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
.modal-hero-grad1 { position: absolute; inset: 0; background: linear-gradient(0deg, #0a0a0f 0%, rgba(10,10,15,0.3) 60%, transparent 100%); }
.modal-hero-grad2 { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(10,10,15,0.7) 0%, transparent 60%); }
.modal-hero-info { position: absolute; bottom: 0; left: 0; padding: 24px 32px; }
.modal-genre-tags { display: flex; gap: 8px; margin-bottom: 8px; }
.modal-genre-tag { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); padding: 2px 10px; border-radius: 4px; font-size: 10px; letter-spacing: 0.05em; }
.modal-title { font-size: clamp(24px,4vw,36px); font-weight: 200; color: #fff; margin-bottom: 4px; line-height: 1.2; }
.modal-subtitle { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 12px; }
.modal-ratings { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.modal-body { padding: 24px 32px; }
.modal-body > * + * { margin-top: 32px; }
.modal-synopsis { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.7; }
.crew-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); border-radius: 16px; padding: 16px; }
@media(min-width:768px){ .crew-grid { grid-template-columns: repeat(3,1fr); } }
.crew-name { font-size: 14px; font-weight: 300; color: #fff; }
.crew-role { font-size: 12px; color: rgba(255,255,255,0.4); }
.section-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
.cast-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
.cast-card { flex-shrink: 0; width: 80px; text-align: center; }
.cast-photo { width: 64px; height: 64px; border-radius: 999px; object-fit: cover; margin: 0 auto 4px; display: block; }
.cast-no-photo { width: 64px; height: 64px; border-radius: 999px; background: var(--glass-bg); border: 1px solid var(--glass-border); margin: 0 auto 4px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); }
.cast-name { font-size: 11px; color: #fff; font-weight: 300; line-height: 1.3; }
.cast-char { font-size: 10px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.platform-row { display: flex; flex-wrap: wrap; gap: 8px; }
.platform-tag { display: flex; align-items: center; gap: 6px; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 8px; }
.platform-logo { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
.platform-name { font-size: 12px; color: rgba(255,255,255,0.7); }
.meta-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px; }
.meta-row { display: flex; gap: 16px; margin-bottom: 12px; }
.meta-row:last-child { margin-bottom: 0; }
.meta-key { font-size: 12px; color: rgba(255,255,255,0.4); width: 80px; flex-shrink: 0; padding-top: 2px; }
.meta-val { font-size: 12px; color: #fff; }

/* TRAILER MODAL */
#trailer-modal { position: fixed; inset: 0; z-index: 70; display: none; align-items: center; justify-content: center; }
#trailer-modal.open { display: flex; }
.trailer-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
.trailer-wrap { position: relative; width: 100%; max-width: 768px; margin: 0 16px; aspect-ratio: 16/9; }
.trailer-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 14px; font-family: 'Manrope', sans-serif; }
.trailer-close:hover { color: #fff; }
#trailer-iframe { width: 100%; height: 100%; border-radius: 12px; border: none; }

/* ERROR */
#error-banner { display: none; margin-bottom: 24px; background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; font-size: 14px; color: rgba(255,255,255,0.6); }
#error-banner.show { display: block; }

/* FADE IN */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s ease forwards; }

@media(max-width:768px){
  .nav-inner { padding: 16px 20px; }
  .hero-content { padding: 0 20px; }
  .tab-bar-inner { padding: 0 20px; }
  .content-area { padding: 32px 20px; }
  .modal-hero-info { padding: 16px 20px; }
  .modal-body { padding: 20px; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<header id="navbar">
  <div class="nav-inner">
    <div class="nav-logo">WatchTonight<span>今晚看什麼</span></div>
    <div class="nav-right">
      <div class="search-wrap">
        <span class="material-symbols-outlined search-icon-abs">search</span>
        <input id="global-search" class="search-input" type="text" placeholder="搜尋影片..." oninput="globalSearch(this.value)"/>
      </div>
      <button class="nav-icon-btn mobile-only" onclick="">
        <span class="material-symbols-outlined" style="font-size:20px">search</span>
      </button>
      <button id="refresh-btn" class="nav-refresh-btn" onclick="refreshData()">
        <span class="material-symbols-outlined" id="refresh-icon" style="font-size:20px">refresh</span>
        <span class="refresh-label">更新</span>
      </button>
    </div>
  </div>
</header>

<!-- HERO -->
<section id="hero">
  <img id="hero-img" src="" alt=""/>
  <div class="hero-gradient"></div>
  <div class="hero-gradient-side"></div>
  <div class="hero-content">
    <div class="hero-inner">
      <div class="hero-ratings">
        <div class="hero-rating-item">
          <span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1;">star</span>
          <span id="hero-imdb">IMDb —</span>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-rating-item">
          <span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1;">star</span>
          <span id="hero-tmdb">TMDB —</span>
        </div>
      </div>
      <h1 class="hero-title" id="hero-title">—</h1>
      <p class="hero-synopsis" id="hero-synopsis">—</p>
      <div class="hero-btns">
        <button class="btn-trailer" id="hero-trailer-btn" onclick="openTrailer()" style="display:none">
          <span class="material-symbols-outlined" style="font-size:18px">play_arrow</span>播放預告
        </button>
        <button class="btn-detail" onclick="openModal(heroMovieId)">查看詳情</button>
      </div>
    </div>
  </div>
</section>

<!-- TAB BAR -->
<div id="tab-bar">
  <div class="tab-bar-inner">
    <div class="tabs">
      <button class="tab-btn active" id="tab-now" onclick="switchTab('now')">現正熱映</button>
      <button class="tab-btn" id="tab-soon" onclick="switchTab('soon')">即將上映</button>
      <button class="tab-btn" id="tab-stream" onclick="switchTab('stream')">串流新上架</button>
    </div>
    <div class="filter-row">
      <div class="tab-search-wrap">
        <span class="material-symbols-outlined search-icon-abs" style="font-size:18px;color:rgba(255,255,255,0.4)">search</span>
        <input id="tab-search" class="tab-search" type="text" placeholder="在分類中搜尋..." oninput="tabSearch(this.value)"/>
      </div>
      <div class="filter-right">
        <span class="sort-label">排序方式:</span>
        <select id="sort-select" class="sort-select" onchange="sortMovies()">
          <option value="date_desc">上映日期（新→舊）</option>
          <option value="date_asc">上映日期（舊→新）</option>
          <option value="tmdb_desc">TMDB 評分（高→低）</option>
          <option value="tmdb_asc">TMDB 評分（低→高）</option>
          <option value="imdb_desc">IMDb 評分（高→低）</option>
          <option value="imdb_asc">IMDb 評分（低→高）</option>
        </select>
        <div class="divider-v"></div>
        <button class="filter-btn" onclick="toggleFilter()">
          <span class="material-symbols-outlined" style="font-size:16px">tune</span>篩選
        </button>
      </div>
    </div>
    <div id="filter-panel">
      <div class="filter-groups">
        <div>
          <p class="filter-group-label">類型</p>
          <div class="filter-tags" id="genre-filters"></div>
        </div>
        <div>
          <p class="filter-group-label">最低評分</p>
          <select id="min-rating-select" class="rating-select" onchange="applyFilters()">
            <option value="0">不限</option>
            <option value="6">6 分以上</option>
            <option value="7">7 分以上</option>
            <option value="8">8 分以上</option>
          </select>
        </div>
        <div id="stream-platform-filter" style="display:none">

</footer>

<script>
var TMDB_KEY = "2ff61a89bf2684be8b207853cd89db24";
var OMDB_KEY = "d2e6c0dc";
var TMDB_BASE = "https://api.themoviedb.org/3";
var IMG_W = "https://image.tmdb.org/t/p/w500";
var IMG_BG = "https://image.tmdb.org/t/p/w1280";
var CACHE_KEY = "watchtonight_v3";
var CACHE_TTL = 24 * 60 * 60 * 1000;

var allMovies = { now: [], soon: [], stream: [] };
var filtered = { now: [], soon: [], stream: [] };
var currentTab = "now";
var heroMovieId = null;
var heroTrailerKey = null;
var activeGenres = {};
var activePlatforms = {};

var genreMap = {
  "动作":"動作","冒险":"冒險","喜剧":"喜劇","犯罪":"犯罪","纪录片":"紀錄片",
  "剧情":"劇情","家庭":"家庭","奇幻":"奇幻","历史":"歷史","恐怖":"恐怖",
  "音乐":"音樂","悬疑":"懸疑","爱情":"愛情","科幻":"科幻","电视电影":"電視電影",
  "惊悚":"驚悚","战争":"戰爭","西部":"西部","动画":"動畫","传记":"傳記",
  "运动":"運動","歌舞":"歌舞","武侠":"武俠","古装":"古裝"
};

function toTrad(s) { return genreMap[s] || s; }

function tmdbScore(v) {
  if (!v) return "";
  var n = parseFloat(v);
  if (isNaN(n)) return "";
  return Math.round(n * 10) + "%";
}

function today() { return new Date().toISOString().split("T")[0]; }
function daysAgo(n) { return new Date(Date.now() - n * 86400000).toISOString().split("T")[0]; }
function daysLater(n) { return new Date(Date.now() + n * 86400000).toISOString().split("T")[0]; }
function formatDate(d) {
  if (!d) return "";
  var parts = d.split("-");
  return parts[0] + "/" + parts[1] + "/" + parts[2];
}

function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data })); } catch(e) {}
}
function loadCache() {
  try {
    var raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    var obj = JSON.parse(raw);
    if (Date.now() - obj.ts > CACHE_TTL) return null;
    return obj.data;
  } catch(e) { return null; }
}

function tmdbFetch(path, params) {
  if (!params) params = {};
  var url = new URL(TMDB_BASE + path);
  url.searchParams.set("api_key", TMDB_KEY);
  url.searchParams.set("language", "zh-TW");
  url.searchParams.set("region", "TW");
  var keys = Object.keys(params);
  for (var i = 0; i < keys.length; i++) {
    url.searchParams.set(keys[i], params[keys[i]]);
  }
  return fetch(url.toString()).then(function(r) {
    if (!r.ok) throw new Error("TMDB " + r.status);
    return r.json();
  });
}

function fetchPages(path, params, maxPages) {
  if (!maxPages) maxPages = 3;
  var p1 = Object.assign({}, params, { page: 1 });
  return tmdbFetch(path, p1).then(function(first) {
    var total = Math.min(first.total_pages, maxPages);
    var promises = [];
    for (var i = 2; i <= total; i++) {
      promises.push(tmdbFetch(path, Object.assign({}, params, { page: i })));
    }
    return Promise.all(promises).then(function(rest) {
      var all = [first].concat(rest);
      var results = [];
      for (var j = 0; j < all.length; j++) {
        results = results.concat(all[j].results);
      }
      return results;
    });
  });
}

function getDetail(id) {
  return tmdbFetch("/movie/" + id, { append_to_response: "videos,credits,watch/providers" }).then(function(d) {
    var videos = (d.videos && d.videos.results) ? d.videos.results : [];
    var trailer = null;
    for (var i = 0; i < videos.length; i++) {
      if (videos[i].type === "Trailer" && videos[i].site === "YouTube") { trailer = videos[i]; break; }
    }
    if (!trailer && videos.length > 0) trailer = videos[0];

    var tw = (d["watch/providers"] && d["watch/providers"].results) ? d["watch/providers"].results.TW : null;
    var flat = (tw && tw.flatrate) ? tw.flatrate : [];
    var rent = (tw && tw.rent) ? tw.rent : [];
    var buy = (tw && tw.buy) ? tw.buy : [];
    var allP = flat.concat(rent).concat(buy);
    var seen = {};
    var platforms = [];
    for (var j = 0; j < allP.length; j++) {
      if (!seen[allP[j].provider_name]) {
        seen[allP[j].provider_name] = true;
        platforms.push({ name: allP[j].provider_name, logo: allP[j].logo_path });
      }
    }

    var cast = [];
    if (d.credits && d.credits.cast) {
      var c = d.credits.cast.slice(0, 8);
      for (var k = 0; k < c.length; k++) {
        cast.push({ name: c[k].name, char: c[k].character, photo: c[k].profile_path ? IMG_W + c[k].profile_path : null });
      }
    }

    var crew = [];
    if (d.credits && d.credits.crew) {
      var validJobs = ["Director", "Screenplay", "Writer"];
      var cr = d.credits.crew;
      for (var m = 0; m < cr.length && crew.length < 3; m++) {
        if (validJobs.indexOf(cr[m].job) !== -1) crew.push({ name: cr[m].name, job: cr[m].job });
      }
    }

    var genres = [];
    if (d.genres) {
      for (var g = 0; g < d.genres.length; g++) genres.push(toTrad(d.genres[g].name));
    }

    return {
      duration: d.runtime || "",
      genres: genres,
      synopsis: d.overview || "",
      poster: d.poster_path ? IMG_W + d.poster_path : null,
      backdrop: d.backdrop_path ? IMG_BG + d.backdrop_path : null,
      voteAverage: d.vote_average ? d.vote_average.toFixed(1) : "",
      trailerKey: trailer ? trailer.key : null,
      cast: cast, crew: crew,
      budget: d.budget || 0, revenue: d.revenue || 0,
      status: d.status || "", origLang: d.original_language || "",
      origTitle: d.original_title || "", platforms: platforms
    };
  }).catch(function() { return {}; });
}

function getImdb(imdbId) {
  if (!imdbId) return Promise.resolve("");
  return fetch("https://www.omdbapi.com/?i=" + imdbId + "&apikey=" + OMDB_KEY).then(function(r) {
    return r.json();
  }).then(function(d) {
    return (d.imdbRating && d.imdbRating !== "N/A") ? d.imdbRating : "";
  }).catch(function() { return ""; });
}

function getExternalIds(id) {
  return tmdbFetch("/movie/" + id + "/external_ids").catch(function() { return {}; });
}

function dedup(arr) {
  var map = {};
  var result = [];
  for (var i = 0; i < arr.length; i++) {
    if (!map[arr[i].id]) { map[arr[i].id] = true; result.push(arr[i]); }
  }
  return result;
}

function enrichList(list, needImdb) {
  if (needImdb === undefined) needImdb = true;
  var detailPromises = list.map(function(m) { return getDetail(m.id); });
  return Promise.all(detailPromises).then(function(details) {
    if (!needImdb) {
      return list.map(function(m, i) {
        return buildMovie(m, details[i], "");
      });
    }
    var idPromises = list.map(function(m) { return getExternalIds(m.id); });
    return Promise.all(idPromises).then(function(extIds) {
      var imdbPromises = extIds.map(function(ext) { return getImdb(ext.imdb_id); });
      return Promise.all(imdbPromises).then(function(imdbRatings) {
        return list.map(function(m, i) {
          return buildMovie(m, details[i], imdbRatings[i]);
        });
      });
    });
  });
}

function buildMovie(m, detail, imdb) {
  return {
    id: m.id,
    titleZh: m.title || "",
    titleEn: m.original_title || "",
    releaseDate: m.release_date || "",
    poster: detail.poster || null,
    backdrop: detail.backdrop || null,
    genre: detail.genres || [],
    duration: detail.duration || "",
    synopsis: detail.synopsis || "",
    voteAverage: detail.voteAverage || "",
    imdb: imdb || "",
    trailerKey: detail.trailerKey || null,
    cast: detail.cast || [],
    crew: detail.crew || [],
    budget: detail.budget || 0,
    revenue: detail.revenue || 0,
    status: detail.status || "",
    origLang: detail.origLang || "",
    origTitle: detail.origTitle || "",
    platforms: detail.platforms || [],
    popularity: m.popularity || 0
  };
}

function fetchAll() {
  var nowParams = { "release_date.gte": daysAgo(30), "release_date.lte": today(), sort_by: "popularity.desc", with_release_type: "3|2" };
  var soonParams = { "release_date.gte": daysLater(1), "release_date.lte": daysLater(180), sort_by: "release_date.asc", with_release_type: "3|2" };
  var streamParams = { "release_date.gte": daysAgo(30), "release_date.lte": today(), sort_by: "popularity.desc", watch_region: "TW", with_watch_monetization_types: "flatrate", "vote_count.gte": 50 };

  return Promise.all([
    fetchPages("/discover/movie", nowParams, 3),
    fetchPages("/discover/movie", soonParams, 3),
    fetchPages("/discover/movie", streamParams, 2)
  ]).then(function(results) {
    var np = dedup(results[0]).slice(0, 30);
    var cs = dedup(results[1]).slice(0, 40);
    var npIds = {};
    np.forEach(function(m) { npIds[m.id] = true; });
    var st = dedup(results[2]).filter(function(m) { return !npIds[m.id]; }).slice(0, 30);

    return Promise.all([
      enrichList(np, true),
      enrichList(cs, false),
      enrichList(st, true)
    ]).then(function(enriched) {
      return { now: enriched[0], soon: enriched[1], stream: enriched[2] };
    });
  });
}

function cardHTML(m, showRatings) {
  var poster = m.poster
    ? '<img src="' + m.poster + '" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;transition:transform 0.7s"/>'
    : '<div class="card-no-img"><span class="material-symbols-outlined" style="font-size:48px">movie</span></div>';
  var titleEn = (m.titleEn && m.titleEn !== m.titleZh)
    ? '<p class="card-title-en">' + escHtml(m.titleEn) + '</p>'
    : '<div style="height:4px"></div>';
  var metaHTML = '<div class="card-meta"><span class="card-date">' + formatDate(m.releaseDate) + '</span>';
  if (showRatings) {
    if (m.imdb) metaHTML += '<span class="badge-imdb">IMDb ' + escHtml(m.imdb) + '</span>';
    if (m.voteAverage) metaHTML += '<span class="badge-tmdb">TMDB ' + tmdbScore(m.voteAverage) + '</span>';
  }
  metaHTML += '</div>';
  return '<div class="movie-card fade-in" onclick="openModal(' + m.id + ')">' +
    '<div class="card-img-wrap">' + poster +
    '<div class="card-hover-overlay"><span class="card-hover-genre">' + escHtml(m.genre.slice(0,2).join(' / ')) + '</span></div></div>' +
    '<p class="card-title">' + escHtml(m.titleZh) + '</p>' +
    titleEn + metaHTML + '</div>';
}

function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function skeletonHTML() {
  var html = "";
  for (var i = 0; i < 5; i++) {
    html += '<div><div class="skeleton" style="aspect-ratio:2/3;border-radius:16px;margin-bottom:12px"></div>' +
      '<div class="skeleton" style="height:12px;border-radius:6px;margin-bottom:6px;width:75%"></div>' +
      '<div class="skeleton" style="height:10px;border-radius:6px;margin-bottom:6px;width:50%"></div>' +
      '<div class="skeleton" style="height:10px;border-radius:6px;width:65%"></div></div>';
  }
  return html;
}

function showSkeletons() {
  ["now","soon","stream"].forEach(function(t) {
    document.getElementById("grid-" + t).innerHTML = skeletonHTML();
  });
}

function renderGrids() {
  ["now","soon","stream"].forEach(function(t) {
    var showR = t !== "soon";
    var html = "";
    for (var i = 0; i < filtered[t].length; i++) html += cardHTML(filtered[t][i], showR);
    document.getElementById("grid-" + t).innerHTML = html;
    var empty = document.getElementById("empty-" + t);
    if (filtered[t].length === 0) empty.classList.add("show");
    else empty.classList.remove("show");
  });
}

function renderHero(movies) {
  if (!movies || !movies.length) return;
  var m = movies[0];
  for (var i = 1; i < movies.length; i++) {
    if (movies[i].popularity > m.popularity) m = movies[i];
  }
  heroMovieId = m.id;
  heroTrailerKey = m.trailerKey;
  document.getElementById("hero-title").textContent = m.titleZh || "—";
  document.getElementById("hero-synopsis").textContent = m.synopsis || "—";
  document.getElementById("hero-tmdb").textContent = "TMDB " + (tmdbScore(m.voteAverage) || "—");
  document.getElementById("hero-imdb").textContent = "IMDb " + (m.imdb || "—");
  var trailerBtn = document.getElementById("hero-trailer-btn");
  trailerBtn.style.display = m.trailerKey ? "" : "none";
  if (m.backdrop) {
    var img = document.getElementById("hero-img");
    img.style.opacity = "0";
    img.src = m.backdrop;
    img.onload = function() { img.style.opacity = "0.5"; };
  }
}

function applyFilters() {
  var minRating = parseFloat(document.getElementById("min-rating-select").value) || 0;
  var searchVal = (document.getElementById("tab-search").value || "").toLowerCase();
  var genreKeys = Object.keys(activeGenres);
  var platformKeys = Object.keys(activePlatforms);

  ["now","soon","stream"].forEach(function(t) {
    filtered[t] = allMovies[t].filter(function(m) {
      if (searchVal && m.titleZh.toLowerCase().indexOf(searchVal) === -1 && m.titleEn.toLowerCase().indexOf(searchVal) === -1) return false;
      if (minRating > 0) {
        var tv = parseFloat(m.voteAverage) || 0;
        var iv = parseFloat(m.imdb) || 0;
        if (tv < minRating && iv < minRating) return false;
      }
      if (genreKeys.length > 0) {
        var hasGenre = false;
        for (var i = 0; i < m.genre.length; i++) {
          if (activeGenres[m.genre[i]]) { hasGenre = true; break; }
        }
        if (!hasGenre) return false;
      }
      if (t === "stream" && platformKeys.length > 0) {
        var hasPlatform = false;
        for (var j = 0; j < m.platforms.length; j++) {
          if (activePlatforms[m.platforms[j].name]) { hasPlatform = true; break; }
        }
        if (!hasPlatform) return false;
      }
      return true;
    });
  });
  sortMovies();
}

function sortMovies() {
  var val = document.getElementById("sort-select").value;
  function sorter(a, b) {
    if (val === "date_desc") return b.releaseDate > a.releaseDate ? 1 : -1;
    if (val === "date_asc") return a.releaseDate > b.releaseDate ? 1 : -1;
    if (val === "tmdb_desc") return (parseFloat(b.voteAverage)||0) - (parseFloat(a.voteAverage)||0);
    if (val === "tmdb_asc") return (parseFloat(a.voteAverage)||0) - (parseFloat(b.voteAverage)||0);
    if (val === "imdb_desc") return (parseFloat(b.imdb)||0) - (parseFloat(a.imdb)||0);
    if (val === "imdb_asc") return (parseFloat(a.imdb)||0) - (parseFloat(b.imdb)||0);
    return 0;
  }
  ["now","soon","stream"].forEach(function(t) { filtered[t] = filtered[t].slice().sort(sorter); });
  renderGrids();
}

function tabSearch(val) { applyFilters(); }
function globalSearch(val) { document.getElementById("tab-search").value = val; applyFilters(); }

function buildGenreFilters() {
  var genreSet = {};
  ["now","soon","stream"].forEach(function(t) {
    allMovies[t].forEach(function(m) {
      m.genre.forEach(function(g) { genreSet[toTrad(g)] = true; });
    });
  });
  var genres = Object.keys(genreSet).sort();
  var html = "";
  for (var i = 0; i < genres.length; i++) {
    html += '<button class="filter-tag" onclick="toggleGenre(\'' + escHtml(genres[i]) + '\',this)">' + escHtml(genres[i]) + '</button>';
  }
  document.getElementById("genre-filters").innerHTML = html;
}

function buildPlatformFilters() {
  var pSet = {};
  allMovies.stream.forEach(function(m) {
    m.platforms.forEach(function(p) { pSet[p.name] = true; });
  });
  var platforms = Object.keys(pSet).sort();
  var html = "";
  for (var i = 0; i < platforms.length; i++) {
    html += '<button class="filter-tag" onclick="togglePlatform(\'' + escHtml(platforms[i]) + '\',this)">' + escHtml(platforms[i]) + '</button>';
  }
  document.getElementById("platform-filters").innerHTML = html;
}

function toggleGenre(g, btn) {
  if (activeGenres[g]) { delete activeGenres[g]; btn.classList.remove("active"); }
  else { activeGenres[g] = true; btn.classList.add("active"); }
  applyFilters();
}

function togglePlatform(p, btn) {
  if (activePlatforms[p]) { delete activePlatforms[p]; btn.classList.remove("active"); }
  else { activePlatforms[p] = true; btn.classList.add("active"); }
  applyFilters();
}

function clearFilters() {
  activeGenres = {};
  activePlatforms = {};
  document.getElementById("min-rating-select").value = "0";
  document.getElementById("tab-search").value = "";
  document.getElementById("global-search").value = "";
  document.querySelectorAll(".filter-tag").forEach(function(btn) { btn.classList.remove("active"); });
  applyFilters();
}

function toggleFilter() {
  var panel = document.getElementById("filter-panel");
  var streamF = document.getElementById("stream-platform-filter");
  panel.style.display = panel.style.display === "none" || panel.style.display === "" ? "block" : "none";
  streamF.style.display = (currentTab === "stream" && panel.style.display === "block") ? "block" : "none";
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll(".tab-content").forEach(function(el) { el.classList.remove("active"); });
  document.querySelectorAll(".tab-btn").forEach(function(el) { el.classList.remove("active"); });
  document.getElementById("content-" + t).classList.add("active");
  document.getElementById("tab-" + t).classList.add("active");
  var panel = document.getElementById("filter-panel");
  var streamF = document.getElementById("stream-platform-filter");
  if (panel.style.display === "block") {
    streamF.style.display = t === "stream" ? "block" : "none";
  }
}

function openModal(id) {
  if (!id) return;
  var modal = document.getElementById("detail-modal");
  var content = document.getElementById("modal-content");
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
  content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div class="skeleton" style="width:64px;height:64px;border-radius:50%"></div></div>';

  var movie = null;
  ["now","soon","stream"].forEach(function(t) {
    allMovies[t].forEach(function(m) { if (m.id === id) movie = m; });
  });
  if (!movie) movie = {};

  getDetail(id).then(function(detail) {
    var imdbRating = movie.imdb || "";
    if (!imdbRating) {
      return getExternalIds(id).then(function(ext) {
        return getImdb(ext.imdb_id);
      }).then(function(rating) {
        imdbRating = rating;
        renderModal(movie, detail, imdbRating);
      });
    } else {
      renderModal(movie, detail, imdbRating);
    }
  });
}

function renderModal(movie, detail, imdbRating) {
  var trailerKey = detail.trailerKey || movie.trailerKey;
  var langMap = {en:"英語",zh:"中文",ja:"日語",ko:"韓語",fr:"法語",es:"西班牙語",de:"德語",it:"義大利語",th:"泰語",hi:"印地語"};
  var statusMap = {Released:"已上映","In Production":"製作中",Planned:"計畫中"};

  var genreTags = "";
  var genres = detail.genres || movie.genre || [];
  for (var i = 0; i < Math.min(genres.length, 3); i++) {
    genreTags += '<span class="modal-genre-tag">' + escHtml(genres[i]) + '</span>';
  }

  var castHTML = "";
  var cast = detail.cast || movie.cast || [];
  for (var c = 0; c < cast.length; c++) {
    castHTML += '<div class="cast-card">';
    if (cast[c].photo) castHTML += '<img class="cast-photo" src="' + escHtml(cast[c].photo) + '" loading="lazy"/>';
    else castHTML += '<div class="cast-no-photo"><span class="material-symbols-outlined">person</span></div>';
    castHTML += '<p class="cast-name">' + escHtml(cast[c].name) + '</p>';
    castHTML += '<p class="cast-char">' + escHtml(cast[c].char) + '</p></div>';
  }

  var crewHTML = "";
  var crew = detail.crew || movie.crew || [];
  for (var cr = 0; cr < crew.length; cr++) {
    var roleLabel = crew[cr].job === "Director" ? "導演" : crew[cr].job === "Screenplay" ? "編劇" : "製作人";
    crewHTML += '<div><p class="crew-name">' + escHtml(crew[cr].name) + '</p><p class="crew-role">' + roleLabel + '</p></div>';
  }

  var platformHTML = "";
  var platforms = detail.platforms || movie.platforms || [];
  if (platforms.length > 0) {
    for (var p = 0; p < platforms.length; p++) {
      platformHTML += '<div class="platform-tag">';
      if (platforms[p].logo) platformHTML += '<img class="platform-logo" src="https://image.tmdb.org/t/p/w92' + platforms[p].logo + '"/>';
      platformHTML += '<span class="platform-name">' + escHtml(platforms[p].name) + '</span></div>';
    }
  }

  var metaRows = [
    ["原始標題", detail.origTitle || movie.titleEn || "—"],
    ["狀態", statusMap[detail.status] || detail.status || "—"],
    ["原始語言", langMap[detail.origLang] || detail.origLang || "—"],
    ["電影成本", detail.budget ? "$" + detail.budget.toLocaleString() : "—"],
    ["票房收入", detail.revenue ? "$" + detail.revenue.toLocaleString() : "—"],
    ["上映日期", formatDate(movie.releaseDate) || "—"]
  ];
  var metaHTML = "";
  for (var mr = 0; mr < metaRows.length; mr++) {
    metaHTML += '<div class="meta-row"><span class="meta-key">' + metaRows[mr][0] + '</span><span class="meta-val">' + escHtml(metaRows[mr][1]) + '</span></div>';
  }

  var backdropHTML = detail.backdrop
    ? '<img src="' + detail.backdrop + '" style="width:100%;height:100%;object-fit:cover;opacity:0.6"/>'
    : '<div style="width:100%;height:100%;background:rgba(255,255,255,0.05)"></div>';

  var html = '<div class="fade-in"><div class="modal-hero">' + backdropHTML +
    '<div class="modal-hero-grad1"></div><div class="modal-hero-grad2"></div>' +
    '<div class="modal-hero-info">' +
    '<div class="modal-genre-tags">' + genreTags + '</div>' +
    '<h2 class="modal-title">' + escHtml(movie.titleZh || detail.origTitle || "—") + '</h2>' +
    '<p class="modal-subtitle">' + escHtml(detail.origTitle || "") +
    (movie.releaseDate ? ' · ' + movie.releaseDate.split('-')[0] : '') +
    (detail.duration ? ' · ' + detail.duration + '分鐘' : '') + '</p>' +
    '<div class="modal-ratings">' +
    (imdbRating ? '<span class="badge-imdb" style="font-size:12px;padding:3px 8px">IMDb ' + escHtml(imdbRating) + '</span>' : '') +
    (detail.voteAverage ? '<span class="badge-tmdb" style="font-size:12px;padding:3px 8px">TMDB ' + tmdbScore(detail.voteAverage) + '</span>' : '') +
    '</div>' +
    (trailerKey ? '<button class="btn-trailer" onclick="playTrailer(\'' + trailerKey + '\')"><span class="material-symbols-outlined" style="font-size:16px">play_arrow</span>播放預告</button>' : '') +
    '</div></div>' +
    '<div class="modal-body">' +
    (detail.synopsis ? '<p class="modal-synopsis">' + escHtml(detail.synopsis) + '</p>' : '') +
    (crewHTML ? '<div class="crew-grid">' + crewHTML + '</div>' : '') +
    (castHTML ? '<div><p class="section-label">主要演員</p><div class="cast-row">' + castHTML + '</div></div>' : '') +
    (platformHTML ? '<div><p class="section-label">收看平台</p><div class="platform-row">' + platformHTML + '</div></div>' : '') +
    '<div><p class="section-label">其他資訊</p><div class="meta-panel">' + metaHTML + '</div></div>' +
    '</div></div>';

  document.getElementById("modal-content").innerHTML = html;
}

function closeModal() {
  document.getElementById("detail-modal").classList.remove("open");
  document.body.style.overflow = "";
}

function openTrailer() { if (heroTrailerKey) playTrailer(heroTrailerKey); }

function playTrailer(key) {
  document.getElementById("trailer-iframe").src = "https://www.youtube.com/embed/" + key + "?autoplay=1";
  document.getElementById("trailer-modal").classList.add("open");
}

function closeTrailer() {
  document.getElementById("trailer-iframe").src = "";
  document.getElementById("trailer-modal").classList.remove("open");
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { closeModal(); closeTrailer(); }
});

window.addEventListener("scroll", function() {
  var navbar = document.getElementById("navbar");
  var tabBar = document.getElementById("tab-bar");
  var tabBarTop = tabBar.getBoundingClientRect().top;
  if (tabBarTop <= 64) navbar.classList.add("scrolled");
  else navbar.classList.remove("scrolled");
});

function loadData(forceRefresh) {
  var icon = document.getElementById("refresh-icon");
  var btn = document.getElementById("refresh-btn");
  var errBanner = document.getElementById("error-banner");
  errBanner.classList.remove("show");

  if (!forceRefresh) {
    var cached = loadCache();
    if (cached) {
      allMovies = cached;
      filtered = { now: cached.now.slice(), soon: cached.soon.slice(), stream: cached.stream.slice() };
      renderHero(allMovies.now);
      renderGrids();
      buildGenreFilters();
      buildPlatformFilters();
      return;
    }
  }

  icon.classList.add("spinning");
  btn.disabled = true;
  showSkeletons();

  fetchAll().then(function(data) {
    allMovies = data;
    filtered = { now: data.now.slice(), soon: data.soon.slice(), stream: data.stream.slice() };
    saveCache(data);
    renderHero(allMovies.now);
    renderGrids();
    buildGenreFilters();
    buildPlatformFilters();
  }).catch(function(e) {
    errBanner.textContent = "⚠️ 資料載入失敗：" + e.message;
    errBanner.classList.add("show");
    var cached = loadCache();
    if (cached) {
      allMovies = cached;
      filtered = { now: cached.now.slice(), soon: cached.soon.slice(), stream: cached.stream.slice() };
      renderHero(allMovies.now);
      renderGrids();
    }
  }).then(function() {
    icon.classList.remove("spinning");
    btn.disabled = false;
  });
}

function refreshData() { loadData(true); }
loadData(false);
</script>
</body>
</html>
